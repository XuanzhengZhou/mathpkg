title_en: "Corollary 1. If $A_n^\varepsilon = \{\omega : |\xi_n - \xi| \geq \varepsilon\}$ then (8) means that $\sum_{n=1}^{\infty} P(A_n^\varepsilon) < \infty$, $\varepsilon > 0$, and then by the Borel–Cantelli lemma we have $P(A^\varepsilon) = 0$, $\varepsilon > 0$, where $A^\varepsilon = \limsup A_n^\varepsilon = \{A_n^\varepsilon \text{ i.o.}\}$. Therefore"
