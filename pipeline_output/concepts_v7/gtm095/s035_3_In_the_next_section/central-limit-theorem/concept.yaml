id: central-limit-theorem
title_en: "Corollary 1. Let $\{F_n\}$ be a sequence of distribution functions and $\{\varphi_n\}$ the corresponding sequence of characteristic functions. Also let $F$ be a distribution function and $\varphi$ its characteristic function. Then $F_n \xrightarrow{w} F$ if and only if $\varphi_n(t) \rightarrow \varphi(t)$ for all $t \in R$"
