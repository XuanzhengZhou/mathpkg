id: khinchins-law-of-large-numbers
title_en: "Theorem 2 (Khinchin’s Law of Large Numbers). Let $\xi_1, \xi_2, \ldots$ be a sequence of independent identically distributed random variables with $E|\xi_1| < \infty$, $S_n = \xi_1 + \ldots + \xi_n$ and $E\xi_1 = m$. Then $S_n/n \xrightarrow{P} m$, that is, for every $\varepsilon > 0$"
