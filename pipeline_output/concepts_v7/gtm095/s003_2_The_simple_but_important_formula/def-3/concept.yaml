id: def-3
title_en: "Definition 3. Two algebras $\mathcal{A}_1$ and $\mathcal{A}_2$ of events (or sets) are called independent or statistically independent (with respect to the probability $P$) if all pairs of sets $A_1$ and $A_2$, belonging respectively to $\mathcal{A}_1$ and $\mathcal{A}_2$, are independent"
