id: monotone-class
title_en: "Definition 1. A collection $M$ of subsets of $\Omega$ is a monotonic class if $A_n \in M$, $n = 1, 2, \ldots$, together with $A_n \uparrow A$ or $A_n \downarrow A$, implies that $A \in M$"
