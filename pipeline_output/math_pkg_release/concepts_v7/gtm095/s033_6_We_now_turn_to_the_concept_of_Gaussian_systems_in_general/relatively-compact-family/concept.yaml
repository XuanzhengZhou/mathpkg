id: relatively-compact-family
title_en: "Definition 1. A family of probability measures $\mathcal{P} = \{P_\alpha; \alpha \in \mathfrak{A}\}$ is relatively compact if every sequence of measures from $\mathcal{P}$ contains a subsequence which converges weakly to a probability measure"
