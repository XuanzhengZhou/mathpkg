id: "symmetric_group"
name:
  en: "Symmetric Group"
  zh: "对称群"
type: "definition"

description:
  en: "The symmetric group S_n is the group of all permutations (bijections) of the set {1, 2, ..., n} under composition. It has order n! and is the universal group in the sense of Cayley's theorem: every finite group embeds in some symmetric group."
  zh: "对称群 S_n 是集合 {1, 2, ..., n} 上所有置换（双射）在复合运算下构成的群。它的阶为 n!，在凯莱定理的意义下是万有群：每个有限群都嵌入到某个对称群中。"

depends:
  required:
    - group
    - set_and_function
  recommended:
    - subgroup
    - group_action
  suggested:
    - cayley_theorem
    - alternating_group

versions:
  - source: "GTM073"
    author: "Hungerford"
    chapter: "I"
    section: "I.6"
    pages: "46-50"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 6.1"
    statement_latex: |
      S_n = \\operatorname{Sym}(\\{1, \\dots, n\\}) = \\{ \\text{bijections } \\{1,\\dots,n\\} \\to \\{1,\\dots,n\\} \\} \\text{ under composition. } |S_n| = n!.

  - source: "GTM148"
    author: "Rotman"
    chapter: "2"
    section: "2.9"
    pages: "58-65"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 2.60"
    statement_latex: |
      S_n \\text{ is the group of all permutations of } \\{1,2,\\dots,n\\} \\text{ with } |S_n| = n!.

statements:
  - type: "definition"
    name: "Cycle Notation"
    name_zh: "轮换记法"
    latex: |
      \\text{A cycle } (a_1 a_2 \\dots a_k) \\text{ denotes the permutation sending } a_i \\mapsto a_{i+1} \\text{ (indices mod } k \\text{) and fixing all other elements. Every permutation can be written as a product of disjoint cycles.}

  - type: "theorem"
    name: "Transpositions Generate S_n"
    name_zh: "对换生成 S_n"
    latex: |
      S_n = \\langle (1\\,2), (1\\,3), \\dots, (1\\,n) \\rangle = \\langle \\text{all transpositions} \\rangle.
    proof_sketch: |
      1. Any k-cycle can be written as a product of k-1 transpositions: (a_1 a_2 \\dots a_k) = (a_1 a_k)(a_1 a_{k-1})\\dots(a_1 a_2).
      2. Any permutation is a product of cycles, hence a product of transpositions.
      3. Any transposition (i j) = (1 i)(1 j)(1 i), so S_n = \\langle (1 2), (1 3), \\dots, (1 n) \\rangle.

  - type: "theorem"
    name: "S_3 is the Smallest Non-Abelian Group"
    name_zh: "S_3 是最小的非阿贝尔群"
    latex: |
      S_3 = \\{ e, (1\\,2), (1\\,3), (2\\,3), (1\\,2\\,3), (1\\,3\\,2) \\}, \\quad |S_3| = 6. \\text{ It is non-abelian: } (1\\,2)(1\\,3) \\neq (1\\,3)(1\\,2).

  - type: "theorem"
    name: "Sign of a Permutation"
    name_zh: "置换的符号"
    latex: |
      \\operatorname{sgn}: S_n \\to \\{ \\pm 1 \\} \\text{ is a homomorphism. } \\ker(\\operatorname{sgn}) = A_n \\unlhd S_n, \\quad [S_n : A_n] = 2.

lean:
  mathlib4_path: "Mathlib.GroupTheory.Perm.Basic"
  mathlib4_theorem: "Equiv.Perm"
  status: "complete"

exercises:
  - type: "bridge"
    source: "GTM073"
    number: "I.6.3"
    description: "Show S_3 is the smallest non-abelian group. List all subgroups of S_3 and draw the subgroup lattice."
    description_zh: "证明 S_3 是最小的非阿贝尔群。列出 S_3 的所有子群并画出子群格。"
    connects:
      - subgroup
      - abelian_group

  - type: "bridge"
    source: "GTM148"
    number: "2.9.7"
    description: "Prove that S_n is generated by the two permutations (1 2) and (1 2 ... n)."
    description_zh: "证明 S_n 由两个置换 (1 2) 和 (1 2 ... n) 生成。"
    connects:
      - cyclic_group
      - group_generators

  - type: "bridge"
    source: "GTM073"
    number: "I.6.10"
    description: "Find the center of S_n for n ≥ 3. Show that Z(S_n) = {id} for n ≥ 3."
    description_zh: "求 n ≥ 3 时 S_n 的中心。证明当 n ≥ 3 时 Z(S_n) = {id}。"
    connects:
      - normal_subgroup
      - group_isomorphism
