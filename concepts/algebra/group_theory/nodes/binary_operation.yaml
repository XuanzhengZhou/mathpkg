id: "binary_operation"
name:
  en: "Binary Operation"
  zh: "二元运算"
type: "definition"

depends:
  required: ["set_and_function"]
  recommended: []
  suggested: []

versions:
  - source: "GTM073"
    author: "Hungerford"
    chapter: "I"
    section: "I.1"
    pages: "23-25"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 1.1"
    statement_latex: "Let G be a nonempty set. A binary operation on G is a function \\ast: G \\times G \\to G. For each ordered pair (a,b) \\in G \\times G, we denote the image by a \\ast b."

  - source: "GTM148"
    author: "Rotman"
    chapter: "1"
    section: "1.1"
    pages: "1-3"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 1.1"
    statement_latex: "A binary operation \\ast on a set S is a function \\ast: S \\times S \\to S assigning to each ordered pair (a,b) \\in S \\times S an element a \\ast b \\in S."

statements:
  - type: "definition"
    name: "Binary Operation"
    latex: |
      \\text{A binary operation } \\ast \\text{ on a set } S \\text{ is a function } \\ast: S \\times S \\to S, \\text{ denoted } (a,b) \\mapsto a \\ast b.

  - type: "definition"
    name: "Associativity"
    latex: |
      \\text{A binary operation } \\ast \\text{ on } S \\text{ is associative if } \\forall a,b,c \\in S, (a \\ast b) \\ast c = a \\ast (b \\ast c).

  - type: "definition"
    name: "Commutativity"
    latex: |
      \\text{A binary operation } \\ast \\text{ on } S \\text{ is commutative if } \\forall a,b \\in S, a \\ast b = b \\ast a.

  - type: "proposition"
    name: "Closure Property"
    latex: |
      \\text{The defining property of a binary operation is that } S \\text{ is closed under } \\ast: \\text{ for all } a,b \\in S, a \\ast b \\in S.

lean:
  mathlib4_path: "Mathlib.Algebra.Group.Defs"
  mathlib4_theorem: "Mul"
  status: "complete"

exercises:
  - type: "bridge"
    source: "GTM073"
    number: "I.1.2"
    description: "Prove that there are exactly n^(n²) distinct binary operations on a set of n elements."
    connects:
      - "set_and_function"
      - "combinatorics"
