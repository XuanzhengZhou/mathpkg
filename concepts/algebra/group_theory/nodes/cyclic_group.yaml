id: "cyclic_group"
name:
  en: "Cyclic Group"
  zh: "循环群"
type: "definition"

description:
  en: "A group G is cyclic if it is generated by a single element: G = ⟨a⟩ = {a^n | n ∈ ℤ}. Cyclic groups are the simplest groups; up to isomorphism they are either ℤ (infinite) or ℤ/nℤ (finite of order n)."
  zh: "群 G 称为循环群，如果它可以由单个元素生成：G = ⟨a⟩ = {a^n | n ∈ ℤ}。循环群是最简单的群；在同构意义下只有 ℤ（无限循环群）和 ℤ/nℤ（n 阶有限循环群）。"

depends:
  required:
    - group
  recommended:
    - abelian_group
    - subgroup
  suggested:
    - group_isomorphism
    - lagrange_theorem

versions:
  - source: "GTM073"
    author: "Hungerford"
    chapter: "I"
    section: "I.3"
    pages: "24-28"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 3.5"
    statement_latex: |
      G \\text{ is cyclic if there exists } a \\in G \\text{ such that } G = \\langle a \\rangle = \\{ a^n \\mid n \\in \\mathbb{Z} \\}.

  - source: "GTM148"
    author: "Rotman"
    chapter: "2"
    section: "2.2"
    pages: "16-24"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 2.15"
    statement_latex: |
      G \\text{ is cyclic if } G = \\langle a \\rangle \\text{ for some } a \\in G. \\text{ If } |G| = n, \\text{ then } G \\cong \\mathbb{Z}/n\\mathbb{Z}. \\text{ If } |G| = \\infty, \\text{ then } G \\cong \\mathbb{Z}.

statements:
  - type: "theorem"
    name: "Classification of Cyclic Groups"
    name_zh: "循环群的分类"
    latex: |
      \\text{Every cyclic group is isomorphic to either } \\mathbb{Z} \\text{ (infinite cyclic) or } \\mathbb{Z}/n\\mathbb{Z} \\text{ (finite cyclic of order } n \\text{).}
    proof_sketch: |
      1. Let G = \\langle a \\rangle. Define \\varphi: \\mathbb{Z} \\to G by \\varphi(k) = a^k.
      2. \\varphi is a surjective homomorphism.
      3. If \\ker(\\varphi) = \\{0\\}, then \\varphi is injective, so G \\cong \\mathbb{Z}.
      4. If \\ker(\\varphi) = n\\mathbb{Z} for some n > 0, then by the first isomorphism theorem, G \\cong \\mathbb{Z}/n\\mathbb{Z}.

  - type: "theorem"
    name: "Subgroups of Cyclic Groups are Cyclic"
    name_zh: "循环群的子群是循环群"
    latex: |
      \\text{Every subgroup of a cyclic group is cyclic. Moreover, if } G = \\langle a \\rangle \\text{ has order } n, \\text{ then for each positive divisor } d \\text{ of } n, \\text{ there is exactly one subgroup of order } d: \\langle a^{n/d} \\rangle.
    proof_sketch: |
      1. Let H \\le G where G = \\langle a \\rangle. Let m be the smallest positive integer with a^m \\in H.
      2. For any a^k \\in H, write k = qm + r with 0 \\le r < m. Then a^r = a^k \\cdot a^{-qm} \\in H, so r = 0 by minimality of m.
      3. Hence H = \\langle a^m \\rangle, which is cyclic.
      4. For finite case: if |G| = n, H = \\langle a^m \\rangle has order n/\\gcd(m,n). For each divisor d|n, take m = n/d.

  - type: "theorem"
    name: "Groups of Prime Order are Cyclic"
    name_zh: "素数阶群是循环群"
    latex: |
      \\text{If } |G| = p \\text{ is prime, then } G \\text{ is cyclic. Consequently, any two groups of prime order } p \\text{ are isomorphic.}
    proof_sketch: |
      1. Pick g \\in G, g \\neq e. By Lagrange's theorem, |\\langle g \\rangle| divides p.
      2. Since |\\langle g \\rangle| > 1, we must have |\\langle g \\rangle| = p.
      3. Hence G = \\langle g \\rangle, so G is cyclic.

  - type: "theorem"
    name: "Order of an Element in a Cyclic Group"
    name_zh: "循环群中元素的阶"
    latex: |
      \\text{In } G = \\langle a \\rangle \\text{ of order } n, \\text{ the order of } a^k \\text{ is } |a^k| = \\frac{n}{\\gcd(n,k)}. \\\\[4pt]
      a^k \\text{ generates } G \\iff \\gcd(k, n) = 1 \\iff k \\in (\\mathbb{Z}/n\\mathbb{Z})^{\\times}. \\text{ So } \\varphi(n) \\text{ generators, where } \\varphi \\text{ is Euler's totient.}

lean:
  mathlib4_path: "Mathlib.GroupTheory.SpecificGroups.Cyclic"
  mathlib4_theorem: "IsCyclic"
  status: "complete"

exercises:
  - type: "bridge"
    source: "GTM073"
    number: "I.3.8"
    description: "Determine all subgroups of ℤ/12ℤ and draw the subgroup lattice."
    description_zh: "确定 ℤ/12ℤ 的所有子群并画出子群格。"
    connects:
      - subgroup
      - lagrange_theorem

  - type: "bridge"
    source: "GTM148"
    number: "2.2.14"
    description: "Prove that every group of prime order p is cyclic, and any two groups of order p are isomorphic."
    description_zh: "证明每个素数 p 阶群都是循环群，且任意两个 p 阶群同构。"
    connects:
      - lagrange_theorem
      - group_isomorphism

  - type: "bridge"
    source: "GTM073"
    number: "I.3.12"
    description: "Show that if G has no proper nontrivial subgroups, then G is cyclic of prime order."
    description_zh: "证明若 G 没有非平凡的真子群，则 G 是素数阶循环群。"
    connects:
      - subgroup
      - lagrange_theorem

  - type: "bridge"
    source: "GTM148"
    number: "2.2.20"
    description: "Prove that Aut(ℤ/nℤ) ≅ (ℤ/nℤ)^×. Conclude that |Aut(ℤ/nℤ)| = φ(n)."
    description_zh: "证明 Aut(ℤ/nℤ) ≅ (ℤ/nℤ)^×。推出 |Aut(ℤ/nℤ)| = φ(n)。"
    connects:
      - group_isomorphism
      - group_action
