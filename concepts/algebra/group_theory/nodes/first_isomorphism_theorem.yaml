  status: "complete"

exercises:
  - type: "bridge"
    source: "GTM073"
    number: "I.5.20"
    description: "Apply the first isomorphism theorem to φ: ℝ → S¹, φ(t) = e^{2π i t}, to conclude ℝ/ℤ ≅ S¹."
    description_zh: "将第一同构定理应用于 φ: ℝ → S¹, φ(t) = e^{2π i t}，推出 ℝ/ℤ ≅ S¹。"
    connects:
      - quotient_group
      - group_isomorphism

  - type: "bridge"
    source: "GTM148"
    number: "2.8.10"
    description: "Let φ: G → H be a homomorphism with |G| = |H| < ∞. Show φ is injective iff φ is surjective iff φ is an isomorphism."
    description_zh: "设 φ: G → H 是同态且 |G| = |H| < ∞。证明 φ 是单射当且仅当它是满射当且仅当它是同构。"
    connects:
      - group_isomorphism
      - lagrange_theorem

  - type: "bridge"
    source: "GTM211"
    number: "3.3.2"
    description: "Use the first isomorphism theorem to prove that every subgroup of a quotient group G/N has the form H/N for some H ≤ G containing N."
    description_zh: "用第一同构定理证明商群 G/N 的任意子群都具有 H/N 的形式，其中 H ≤ G 且 N ⊆ H。"
    connects:
      - quotient_group
      - correspondence_theorem

  - type: "bridge"
    source: "GTM073"
    number: "I.5.25"
    description: "Let φ: G → H be a homomorphism. Show that the preimage of a normal subgroup of H is a normal subgroup of G."
    description_zh: "设 φ: G → H 是同态。证明 H 的正规子群的原像是 G 的正规子群。"
    connects:
      - normal_subgroup
      - kernel_of_homomorphism
