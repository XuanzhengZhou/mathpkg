exercises:
  - type: "bridge"
    source: "GTM073"
    number: "II.4.10"
    description: "Derive the class equation from the orbit-stabilizer theorem by considering the conjugation action of G on itself."
    connects:
      - group_action
  - type: "bridge"
    source: "GTM148"
    number: "3.52"
    description: "Let G be a finite group of order p^n (p prime) acting on a finite set X. Prove that |X| ≡ |Fix(X)| (mod p), where Fix(X) = {x∈X | g·x=x ∀g∈G}. This is the Fixed Point Congruence."
    connects:
      - lagrange_theorem
