id: "group_homomorphism"
name:
  en: "Group Homomorphism"
  zh: "群同态"
type: "definition"

depends:
  required: ["group"]
  recommended: ["set_and_function"]
  suggested: ["monoid", "subgroup"]

versions:
  - source: "GTM073"
    author: "Hungerford"
    chapter: "I"
    section: "I.2"
    pages: "35-42"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 2.4"
    statement_latex: "Let G and H be groups. A homomorphism from G to H is a function \\varphi: G \\to H such that \\varphi(ab) = \\varphi(a)\\varphi(b) for all a,b \\in G."

  - source: "GTM148"
    author: "Rotman"
    chapter: "1"
    section: "1.3"
    pages: "30-40"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 1.8"
    statement_latex: "A function \\varphi: G \\to H between groups is a homomorphism if \\varphi(xy) = \\varphi(x)\\varphi(y) for all x,y \\in G. If \\varphi is bijective, it is called an isomorphism."

statements:
  - type: "definition"
    name: "Group Homomorphism"
    latex: |
      \\text{A group homomorphism } \\varphi: G \\to H \\text{ between groups } (G,\\ast,e_G) \\text{ and } (H,\\cdot,e_H) \\text{ satisfies } \\varphi(a \\ast b) = \\varphi(a) \\cdot \\varphi(b) \\text{ for all } a,b \\in G.

  - type: "theorem"
    name: "Identity Preservation"
    latex: |
      \\text{If } \\varphi: G \\to H \\text{ is a group homomorphism, then } \\varphi(e_G) = e_H.

  - type: "theorem"
    name: "Inverse Preservation"
    latex: |
      \\text{If } \\varphi: G \\to H \\text{ is a group homomorphism, then } \\forall a \\in G, \\varphi(a^{-1}) = \\varphi(a)^{-1}.

  - type: "theorem"
    name: "Composition of Homomorphisms"
    latex: |
      \\text{If } \\varphi: G \\to H \\text{ and } \\psi: H \\to K \\text{ are group homomorphisms, then } \\psi \\circ \\varphi: G \\to K \\text{ is a group homomorphism.}

  - type: "definition"
    name: "Kernel and Image"
    latex: |
      \\ker(\\varphi) = \\{g \\in G \\mid \\varphi(g) = e_H\\} \\leq G, \\qquad \\operatorname{im}(\\varphi) = \\{\\varphi(g) \\mid g \\in G\\} \\leq H.

  - type: "definition"
    name: "Isomorphism"
    latex: |
      \\text{A homomorphism } \\varphi: G \\to H \\text{ is an isomorphism if it is bijective. Groups } G \\text{ and } H \\text{ are isomorphic, } G \\cong H, \\text{ if there exists an isomorphism between them.}

lean:
  mathlib4_path: "Mathlib.Algebra.Group.Defs"
  mathlib4_theorem: "MonoidHom"
  status: "complete"

exercises:
  - type: "bridge"
    source: "GTM073"
    number: "I.2.8"
    description: "Prove that the composition of two group homomorphisms φ: G → H and ψ: H → K gives a homomorphism ψ∘φ: G → K. Verify that (ψ∘φ)(ab) = (ψ∘φ)(a)(ψ∘φ)(b) for all a,b∈G."
    connects:
      - "composition"
      - "function_composition"
