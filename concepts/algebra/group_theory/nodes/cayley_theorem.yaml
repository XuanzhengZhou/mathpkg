  status: "complete"

exercises:
  - type: "bridge"
    source: "GTM073"
    number: "I.6.12"
    description: "Use Cayley's theorem to show that, up to isomorphism, there are only finitely many groups of any given finite order n. (This does NOT mean the classification is easy!)"
    connects:
      - symmetric_group
  - type: "bridge"
    source: "GTM148"
    number: "2.82"
    description: "Explicitly construct the embedding of the Klein four-group V_4 into S_4 using Cayley's construction. Find the image as a specific subgroup."
    connects:
      - group_isomorphism
