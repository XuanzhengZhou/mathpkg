id: "abelian_group"
name:
  en: "Abelian Group"
  zh: "阿贝尔群"
type: "definition"

depends:
  required: ["group"]
  recommended: []
  suggested: ["monoid", "binary_operation"]

versions:
  - source: "GTM073"
    author: "Hungerford"
    chapter: "I"
    section: "I.1"
    pages: "30-32"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 1.8"
    statement_latex: "A group G is called abelian (or commutative) if the binary operation is commutative, that is, a \\ast b = b \\ast a for all a,b \\in G."

  - source: "GTM148"
    author: "Rotman"
    chapter: "1"
    section: "1.1"
    pages: "18-20"
    approach: "abstract_axiomatic"
    theorem_number: "Definition 1.6"
    statement_latex: "A group G is abelian if a \\ast b = b \\ast a for all a,b \\in G. The name honors Niels Henrik Abel."

statements:
  - type: "definition"
    name: "Abelian Group"
    latex: |
      \\text{An abelian (commutative) group is a group } (G,\\ast,e) \\text{ where } \\forall a,b \\in G, a \\ast b = b \\ast a.

  - type: "theorem"
    name: "Involutions Imply Abelian"
    latex: |
      \\text{If } G \\text{ is a group such that } g^2 = e \\text{ for all } g \\in G, \\text{ then } G \\text{ is abelian.}

  - type: "example"
    name: "Integers under Addition"
    latex: |
      (\\mathbb{Z}, +, 0) \\text{ is an abelian group: addition is associative, commutative, 0 is the identity, and } -a \\text{ is the inverse of } a.

  - type: "example"
    name: "Nonzero Real Numbers under Multiplication"
    latex: |
      (\\mathbb{R}^{\\times}, \\cdot, 1) \\text{ is an abelian group where } \\mathbb{R}^{\\times} = \\mathbb{R} \\setminus \\{0\\}.

  - type: "example"
    name: "Non-Abelian Group"
    latex: |
      S_3 \\text{ (the symmetric group on 3 letters) is not abelian since } (1\\;2)(1\\;3) \\neq (1\\;3)(1\\;2).

lean:
  mathlib4_path: "Mathlib.Algebra.Group.Defs"
  mathlib4_theorem: "CommGroup"
  status: "complete"

exercises:
  - type: "bridge"
    source: "GTM073"
    number: "I.1.20"
    description: "Show that a group where every element squared equals the identity (g² = e for all g ∈ G) is abelian. Hint: Consider (ab)(ab) = e and manipulate to get ab = ba."
    connects:
      - "group"
      - "involution"
