id: cauchy-test-for-convergence-in-the-pth-mean
title_en: 'Theorem 7 (Cauchy Test for Convergence in the $p$th Mean). A necessary and sufficient condition that a sequence $(\xi_n)_{n \geq 1}$ of random variables in $L^p$ converges in the mean of order $p$ to a random variable in $L^p$ is that the sequence is fundamental in the mean of order $p$'
