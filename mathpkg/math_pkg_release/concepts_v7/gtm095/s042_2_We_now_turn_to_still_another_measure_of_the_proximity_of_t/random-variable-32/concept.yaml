id: random-variable-32
title_en: 'Lemma 1. Let $\mathbb{F}$ be the class of continuous distribution functions $F = F(x)$. For any $N \geq 1$ the probability distribution of $D_N(\omega)$ is the same for all $F \in \mathbb{F}$. The same is true also for $D_N^+(\omega)$'
