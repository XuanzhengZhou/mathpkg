id: uniform-integrability
title_en: 'Theorem 5. Let $0 \leq \xi_n \rightarrow \xi$ (P- a.s.) and $E \xi_n < \infty$, $n \geq 1$. Then $E \xi_n \rightarrow E \xi < \infty$ if and only if the family $\{\xi_n\}_{n \geq 1}$ is uniformly integrable'
