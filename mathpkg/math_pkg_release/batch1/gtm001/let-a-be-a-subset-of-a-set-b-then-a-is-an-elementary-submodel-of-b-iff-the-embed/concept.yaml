id: let-a-be-a-subset-of-a-set-b-then-a-is-an-elementary-submodel-of-b-iff-the-embed
title_en: Let $A$ be a subset of a set $B$. Then $A$ is an elementary submodel of
  $B$ iff the embedding map of $A$ into $B$ is an elementary embedding. We write $A
  \prec B$ which is read “$A$ is an elementary submodel of $B$.”
