id: if-pi-xi-rightarrow-eta-is-a-strong-mathfraka-map-and-delta-leq-eta-is-an-ordina
title_en: 'If $\pi: \xi \rightarrow \eta$ is a strong $\mathfrak{A}$-map and $\delta
  \leq \eta$ is an ordinal such that $\mathcal{W}(\pi) \subseteq \delta$, then $\pi:
  \xi \rightarrow \delta$ is a strong $\mathfrak{A}$-map'
