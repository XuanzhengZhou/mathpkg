id: let-kappa-be-a-regular-uncountable-cardinal-and-let-lambda-be-an-ordinal-such-th
title_en: Let $\kappa$ be a regular uncountable cardinal and let $\lambda$ be an ordinal
  such that $\kappa < \lambda$. For each set $X$ with $X \subseteq \lambda$ and $\overline{X}
  < \kappa$, there exists a subalgebra $Y$ of $M^{\lambda}$ such that $X$ is a subset
  of $Y$, $\overline{Y} < \kappa$ and $Y \cap \kappa \in \kappa$
