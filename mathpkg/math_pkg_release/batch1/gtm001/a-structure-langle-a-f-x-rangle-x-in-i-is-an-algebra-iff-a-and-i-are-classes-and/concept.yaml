id: a-structure-langle-a-f-x-rangle-x-in-i-is-an-algebra-iff-a-and-i-are-classes-and
title_en: A structure $\langle A, F_x \rangle_{x \in I}$ is an algebra iff $A$ and
  $I$ are classes and for each $x$ in $I, F_x$ is a partial map from $A^\omega$ to
  $A$. The class $A$ is the universe of the algebra
