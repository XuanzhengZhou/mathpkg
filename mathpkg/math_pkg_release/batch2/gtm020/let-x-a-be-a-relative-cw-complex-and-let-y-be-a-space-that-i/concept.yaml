id: let-x-a-be-a-relative-cw-complex-and-let-y-be-a-space-that-i
title_en: 2.2 Let $(X, A)$ be a relative CW-complex, and let $Y$ be a space that is
  connected in each dimension for which $X$ has cells. Then each map $A \rightarrow
  Y$ prolongs to a map $X \rightarrow Y$.
