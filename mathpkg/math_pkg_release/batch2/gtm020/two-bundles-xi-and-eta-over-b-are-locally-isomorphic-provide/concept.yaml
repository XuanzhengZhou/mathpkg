id: two-bundles-xi-and-eta-over-b-are-locally-isomorphic-provide
title_en: 6.1 Two bundles $\xi$ and $\eta$ over $B$ are locally isomorphic provided
  for each $b \in B$ there exists an open neighborhood $U$ of $b$ such that $\xi|U$
  and $\eta|U$ are $U$-isomorphic.
