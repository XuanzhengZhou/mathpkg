id: a-function-f-m-rightarrow-n-is-a-g-morphism-between-g-module
title_en: '4.3 A function $f: M \rightarrow N$ is a $G$-morphism between $G$-modules
  (both over $F$) provided $f$ is $F$-linear and $f(sx) = sf(x)$ for $x \in M$ and
  $s \in G$.'
