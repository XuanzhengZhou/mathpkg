title_en: 1.8 Let $f(t) = 1 + y_1 t + \cdots + y_n t^n$ in $1 + R[[t]]^+$. Then $\sum_{k
  \geq 0} s_k^n(y_1, \ldots, y_n)(-t)^k = -t[(d/dt)f(t)]/f(t)$.
