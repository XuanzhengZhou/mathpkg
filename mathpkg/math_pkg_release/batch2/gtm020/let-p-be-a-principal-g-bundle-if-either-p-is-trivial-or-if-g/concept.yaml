id: let-p-be-a-principal-g-bundle-if-either-p-is-trivial-or-if-g
title_en: 1.7 Let $P$ be a principal $G$-bundle. If either $P$ is trivial or if $G$
  is abelian, then the topological group $\text{Aut}_B(P)$ is isomorphic to the topological
  group $\text{Map}(B, G)$.
