id: the-stiefel-variety-of-orthonormal-k-frames-in-mathbfrn-deno
title_en: 2.3 The Stiefel variety of (orthonormal) $k$-frames in $\mathbf{R}^n$, denoted
  $V_k(\mathbf{R}^n)$, is the subspace of $(v_1, \ldots, v_k) \in (S^{n-1})^k$ such
  that $(v_i|v_j) = \delta_{i,j}$.
