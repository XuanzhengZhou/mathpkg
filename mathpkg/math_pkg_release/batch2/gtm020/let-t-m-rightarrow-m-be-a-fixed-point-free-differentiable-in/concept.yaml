id: let-t-m-rightarrow-m-be-a-fixed-point-free-differentiable-in
title_en: '9.3 Let $T: M \rightarrow M$ be a fixed point free differentiable involution
  of $M$, that is, $T^2 = 1$ and $T(x) \neq x$ for all $x \in M$. Then there exists
  a manifold $W$ with $\partial W = M$.'
