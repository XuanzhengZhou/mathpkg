id: gauss-map-of-vector-bundle
title_en: "Definition 5.1. A Gauss map of a vector bundle $\\xi^k$ in $F^m$ $(k \\leq m \\leq +\\infty)$ is a map $g: E(\\xi^k) \\rightarrow F^m$ such that $g$ is a linear monomorphism when restricted to any fibre of $\\xi$."
