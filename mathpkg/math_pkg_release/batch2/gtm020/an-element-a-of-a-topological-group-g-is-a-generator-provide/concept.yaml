id: an-element-a-of-a-topological-group-g-is-a-generator-provide
title_en: 8.6 An element $a$ of a topological group $G$ is a generator provided the
  set of all $a^k$, where $k \geq 0$, is dense in $G$. A topological group is monic
  provided it has a generator.
