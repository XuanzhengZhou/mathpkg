id: let-u-x-wedge-x-rightarrow-sr-be-an-r-duality-map-then-delta
title_en: '8.1 Let $u: X \wedge X'' \rightarrow S^r$ be an $r$-duality map. Then $\delta^W(u)_Z:
  \{W, Z \wedge X\} \rightarrow \{W \wedge X'', S^n Z\}$ is an isomorphism for finite
  CW-complexes $W$ and $Z$.'
