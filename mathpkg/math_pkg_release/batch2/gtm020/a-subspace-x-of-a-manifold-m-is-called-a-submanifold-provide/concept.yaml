id: a-subspace-x-of-a-manifold-m-is-called-a-submanifold-provide
title_en: 2.4 A subspace $X$ of a manifold $M$ is called a submanifold provided each
  $x \in X$ has a chart $(U, \phi)$ of $M$ such that $X \cap U = \phi^{-1}((0 \times
  \mathbf{R}^q) \cap H^n)$.
