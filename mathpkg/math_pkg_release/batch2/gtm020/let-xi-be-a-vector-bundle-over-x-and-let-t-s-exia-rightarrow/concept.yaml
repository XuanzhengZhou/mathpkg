id: let-xi-be-a-vector-bundle-over-x-and-let-t-s-exia-rightarrow
title_en: '1.6 Let $\xi$ be a vector bundle over $X$, and let $t_s: E(\xi/A) \rightarrow
  F^n$ be a homotopy of trivializations of $\xi$ over $A$. Then $\xi/t_0$ and $\xi/t_1$
  are isomorphic over $X/A$.'
