id: let-xi-be-a-locally-trivial-bundle-over-b-with-fibre-f-let-f
title_en: '6.7 Let $\xi$ be a locally trivial bundle over $B$ with fibre $F$, let
  $f: B_1 \rightarrow B$ be a map, and let $A$ be a subset of $B$. Then $f^*(\xi)$
  and $\xi|A$ are locally trivial with fibre $F$.'
