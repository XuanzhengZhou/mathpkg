id: let-f-be-a-left-g-space-the-fibre-bundle-automorphisms-xif-r
title_en: '1.2 Let $F$ be a left $G$-space. The fibre bundle automorphisms $\xi[F]
  \rightarrow \xi[F] = (B \times F, p, B)$ are all of the form $h_g(b, y) = (b, g(b)y)$,
  where $g: B \rightarrow G$ is a map.'
