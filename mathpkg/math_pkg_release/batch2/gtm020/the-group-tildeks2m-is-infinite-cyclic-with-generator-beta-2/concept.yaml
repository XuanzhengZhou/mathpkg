id: the-group-tildeks2m-is-infinite-cyclic-with-generator-beta-2
title_en: 11.2 The group $\tilde{K}(S^{2m})$ is infinite cyclic with generator $\beta_{2m}$
  such that $\beta_{2m}^2 = 0$. Moreover, $\psi^k(\beta_{2m}) = k^m \beta_{2m}$.
