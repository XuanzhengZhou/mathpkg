id: serre-let-f-s2n-1-rightarrow-sn-be-a-map-and-let-c-f-denote
title_en: '4.4 (Serre) Let $f: S^{2n-1} \rightarrow S^n$ be a map and let $C_f$ denote
  its mapping cone. Then $H^n(C_f) = Zv$, $H^{2n}(C_f) = Zw$, and $v^2 = \pm H([f])$
  where $[f]$ is the homotopy class of $f$.'
