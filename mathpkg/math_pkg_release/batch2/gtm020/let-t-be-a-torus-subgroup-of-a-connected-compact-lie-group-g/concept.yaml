id: let-t-be-a-torus-subgroup-of-a-connected-compact-lie-group-g
title_en: 8.11 Let $T$ be a torus subgroup of a connected, compact Lie group $G$.
  Let $s$ commute with all elements of $T$. Then there exists a torus subgroup $T'$
  of $G$ with $T \subset T'$ and $s \in T'$.
