id: let-f-in-rx-x-1-such-that-fx-f1x-where-r-is-an-arbitrary-com
title_en: 5.2 Let $f \in R[x, x^{-1}]$ such that $f(x) = f(1/x)$, where $R$ is an
  arbitrary commutative ring with 1. Then $f$ is a member of $R[x + x^{-1}] \subset
  R[x, x^{-1}]$.
