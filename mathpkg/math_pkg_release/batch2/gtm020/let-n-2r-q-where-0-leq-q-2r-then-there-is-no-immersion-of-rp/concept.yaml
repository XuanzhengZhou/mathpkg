id: let-n-2r-q-where-0-leq-q-2r-then-there-is-no-immersion-of-rp
title_en: 10.4 Let $n = 2^r + q$, where $0 \leq q < 2^r$. Then there is no immersion
  of $RP^n$ into $\mathbf{R}^m$ for $m = 2^{r+1} - 2$ and no embedding into $\mathbf{R}^k$
  for $k = 2^{r+1} - 1$.
