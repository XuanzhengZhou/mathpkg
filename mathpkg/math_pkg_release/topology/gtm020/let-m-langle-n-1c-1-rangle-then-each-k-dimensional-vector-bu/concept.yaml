id: let-m-langle-n-1c-1-rangle-then-each-k-dimensional-vector-bu
title_en: 1.2 Let $m = \langle ((n + 1)/c) - 1 \rangle$. Then each $k$-dimensional
  vector bundle $\xi^k$ is isomorphic to $\eta^m \oplus \theta^{k-m}$ for some $m$-dimensional
  vector bundle $\eta$.
