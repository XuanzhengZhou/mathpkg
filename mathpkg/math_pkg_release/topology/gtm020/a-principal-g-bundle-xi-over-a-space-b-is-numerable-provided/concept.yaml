id: a-principal-g-bundle-xi-over-a-space-b-is-numerable-provided
title_en: 9.2 A principal $G$-bundle $\xi$ over a space $B$ is numerable provided
  there is a numerable over $\{U_i\}_{i \in S}$ of $B$ such that $\xi|U_i$ is trivial
  for each $i \in S$.
