id: every-cross-section-s-of-a-product-bundle-b-times-f-p-b-has
title_en: '1.5 Every cross section $s$ of a product bundle $(B \times F, p, B)$ has
  the form $s(b) = (b, f(b))$, where $f: B \rightarrow F$ is a map uniquely defined
  by $s$.'
