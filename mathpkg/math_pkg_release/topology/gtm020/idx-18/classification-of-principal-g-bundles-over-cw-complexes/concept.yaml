  role_in_book: "Theorem 13.1: The main classification theorem. For a CW-complex B and a locally trivial principal G-bundle ω whose total space is sufficiently highly connected, the function φ_ω(B): [B, B_0] → k_G(B) sending a homotopy class to the isomorphism class of the pullback bundle is a bijection."
