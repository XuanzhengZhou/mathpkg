id: existence-of-gauss-map
title_en: "Theorem 5.5. For each vector bundle $\\xi^k$ over a paracompact space $B$ there is a Gauss map $g: E(\\xi) \\to F^\\infty$. Moreover, if $B$ has an open covering of sets $\\{U_i\\}$, $1 \\leq i \\leq n$, such that $\\xi|U_i$ is trivial, $\\xi$ has a Gauss map $g: E(\\xi) \\to F^{kn}$."
