id: the-n-dimensional-torus-denoted-tn-is-the-quotient-topologic
title_en: 8.1 The $n$-dimensional torus, denoted $T^n$, is the quotient topological
  group $R^n$ mod $Z^n$. A torus is any topological group isomorphic to an $n$-dimensional
  torus.
