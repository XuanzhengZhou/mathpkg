id: a-bundle-omega-is-called-n-universal-or-universal-for-dimens
title_en: 10.7 A bundle $\omega$ is called $n$-universal, or universal for dimensions
  $\leq n$, provided $\phi_\omega(X)$ is a bijection for each CW-complex $X$ with
  $\dim X \leq n$.
