id: if-m-and-n-are-isomorphic-g-modules-then-chi-m-equals-chi-n
title_en: 7.2 If $M$ and $N$ are isomorphic $G$-modules, then $\chi_M$ equals $\chi_N$.
  For two modules $M$ and $N$, we have $\chi_M \oplus N = \chi_M + \chi_N$ and $\chi_M
  \otimes N = \chi_M \chi_N$.
