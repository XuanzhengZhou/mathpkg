id: if-there-are-rhon-orthonormal-vector-fields-on-sn-1-there-ex
title_en: 10.2 If there are $\rho(n)$ orthonormal vector fields on $S^{n-1}$, there
  exists an integer $m \geq 1$ with $\rho(m) = \rho(n)$ and such that $RP^{m+\rho(m)}/RP^{m-1}$
  is coreducible.
