id: a-bundle-e-p-b-is-a-subbundle-of-e-p-b-provided-e-is-a-subsp
title_en: '1.3 A bundle $(E'', p'', B'')$ is a subbundle of $(E, p, B)$ provided $E''$
  is a subspace of $E$, $B''$ is a subspace of $B$, and $p'' = p | E'' : E'' \rightarrow
  B''$.'
