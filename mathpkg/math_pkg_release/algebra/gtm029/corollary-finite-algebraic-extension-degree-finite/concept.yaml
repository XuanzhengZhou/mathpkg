id: corollary-finite-algebraic-extension-degree-finite
title_en: 'Corollary: If $K^\star$ is a finite algebraic extension of $K$, of degree
  $n$, then also $\Delta^\star$ is a finite algebraic extension of $\Delta$, and we
  have $[\Delta^\star:\Delta] \leq [K^\star:K]$'
