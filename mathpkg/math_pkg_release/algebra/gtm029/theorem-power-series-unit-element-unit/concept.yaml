id: theorem-power-series-unit-element-unit
title_en: 'Theorem: If $f = (f_0, f_1, \cdots, f_q, \cdots)$ is a power series, then
  $f$ is a unit in $S$ if and only if the element $f_0$ of $A$ is a unit in $A$'
