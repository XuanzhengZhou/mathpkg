id: "lemma-12-39"
title_en: "For a strictly positive matrix $Q'$ on a finite set $S$, there exists a strictly positive vector $\bar{h}$ and constant $\bar{c} > 0$ such that $Q'\bar{h} = \bar{c}\bar{h}$, and $Q_{ij} = Q'_{ij}\bar{h}_j/(\bar{c}\bar{h}_i)$ is stochastic"
