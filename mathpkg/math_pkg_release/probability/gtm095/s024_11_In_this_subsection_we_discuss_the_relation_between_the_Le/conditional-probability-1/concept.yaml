id: conditional-probability-1
title_en: 'Definition 2. Let $B \in F$. The conditional expectation $E(I_B \mid G)$ is denoted by $P(B \mid G)$, or $P(B \mid G)(\omega)$, and is called the conditional probability of the event $B$ with respect to the $\sigma$-algebra $G$, $G \subseteq F$'
