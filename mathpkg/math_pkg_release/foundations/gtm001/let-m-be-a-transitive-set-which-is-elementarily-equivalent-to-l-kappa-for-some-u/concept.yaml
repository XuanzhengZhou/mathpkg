id: let-m-be-a-transitive-set-which-is-elementarily-equivalent-to-l-kappa-for-some-u
title_en: 'Let $M$ be a transitive set which is elementarily equivalent to $L_\kappa$
  for some uncountable cardinal in $L$. If $\pi: \langle \delta, \alpha, P \rangle
  \rightarrow \langle \delta'', \alpha'', P'' \rangle$ is an acceptable map such that
  $\langle \delta, \alpha, P \rangle, \langle \delta'', \alpha'', P'' \rangle \in
  M$, then $\pi \in M$'
