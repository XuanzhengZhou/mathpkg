id: "let-define-on-by-then-for-all"
title_en: "(21.51) Lemma.** Let $f \in \mathfrak{L}_1(R)$. Define $f$ on $R$ by $f(x) = f(-x)$. Then $f(y) = f(y)$ for all $y \in R$."
