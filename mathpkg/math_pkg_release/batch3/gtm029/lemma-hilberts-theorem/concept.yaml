id: lemma-hilberts-theorem
title_en: 'Lemma: Let $E$ be an $A$-module $\neq (0)$, and $a_1, \cdots, a_q$ non-invertible
  elements of $A$ such that, for every $i \leq q$, we have $(a_1E + \cdots + a_{i-1}E):
  Aa_i = a_1E + \cdots + a_{i-1}E$'
